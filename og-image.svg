<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e0a"/>
      <stop offset="100%" style="stop-color:#0f1a0f"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Center glow -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#center-glow)"/>

  <!-- Grid lines subtle -->
  <g opacity="0.06" stroke="#22c55e" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#22c55e"/>

  <!-- Ball icon -->
  <circle cx="600" cy="210" r="64" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.9"/>
  <circle cx="600" cy="210" r="64" fill="#22c55e" opacity="0.08"/>
  <text x="600" y="233" font-size="72" text-anchor="middle" font-family="system-ui">⚽</text>

  <!-- Main title -->
  <text x="600" y="345" font-size="72" font-weight="900" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        fill="#e8f5e8" letter-spacing="-1">Fútbol Para Todos</text>

  <!-- Subtitle -->
  <text x="600" y="400" font-size="28" font-weight="400" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        fill="#7a9e7a">Todos los partidos en vivo · Gratis · Sin registro</text>

  <!-- Pills -->
  <rect x="310" y="440" width="160" height="44" rx="22" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
  <text x="390" y="468" font-size="18" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" fill="#22c55e">Liga ARG</text>

  <rect x="490" y="440" width="220" height="44" rx="22" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
  <text x="600" y="468" font-size="18" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" fill="#22c55e">Libertadores</text>

  <rect x="730" y="440" width="160" height="44" rx="22" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
  <text x="810" y="468" font-size="18" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" fill="#22c55e">Champions</text>

  <!-- URL -->
  <text x="600" y="570" font-size="20" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        fill="#4a6a4a">futbol-para-todos-chi.vercel.app</text>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="#22c55e" opacity="0.5"/>
</svg>
