<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telefe en Vivo</title>
<script src="https://ssl.p.jwpcdn.com/player/v/8.22.0/jwplayer.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  #player { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="player"></div>
<script>
  jwplayer.key = 'XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo';

  fetch('/api/telefe-token')
    .then(r => r.json())
    .then(data => {
      if (!data.url) throw new Error('Sin URL');
      jwplayer('player').setup({
        width: '100%',
        height: '100%',
        aspectratio: '16:9',
        autostart: true,
        playlist: [{
          sources: [{ file: data.url, type: 'hls' }]
        }]
      });
      jwplayer('player').on('play', function() {
        jwplayer('player').setCurrentAudioTrack(0);
      });
    })
    .catch(err => {
      document.getElementById('player').innerHTML =
        '<p style="color:#fff;padding:20px;font-family:sans-serif">Error al cargar Telefe: ' + err.message + '</p>';
    });
</script>
</body>
</html>
